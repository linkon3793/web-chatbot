<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Bot</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.header{
    background:#0088cc;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.chat{
    max-width:700px;
    margin:auto;
    padding:15px;
}

.bot{
    background:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.btn{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}
</style>
</head>

<body>

<div class="header">
YOUR BOT NAME
</div>

<div class="chat">

<div class="bot">
[MESSAGE_1]
</div>

<button class="btn">
Continue
</button>

</div>

</body>
</html>
