<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Bot</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}
.header{
    background:#0088cc;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}
.container{
    max-width:700px;
    margin:20px auto;
    padding:15px;
}
.card{
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}
input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    box-sizing:border-box;
}
.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="header">[YOUR BOT NAME]</div>

<div class="container">

<!-- STEP 1 -->
<div id="step1" class="card">
    <p>[MESSAGE_1]</p>
    <button onclick="showStep(2)">হ্যাঁ</button>
    <button onclick="showStep(2)">না</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="card hidden">
    <p>[MESSAGE_2]</p>
    <button onclick="showStep(3)">করতে চাই</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="card hidden">
    <p>[MESSAGE_3_TITLE]</p>

    <label>নাম</label>
    <input type="text" id="name">

    <label>ফোন</label>
    <input type="text" id="phone">

    <label>জেলা</label>
    <input type="text" id="district">

    <label>রাতে কাজ করতে পারবেন?</label>
    <select id="nightwork">
        <option>হ্যাঁ</option>
        <option>না</option>
    </select>

    <button onclick="showStep(4)">জমা দিন</button>
</div>

<!-- STEP 4 -->
<div id="step4" class="card hidden">

    <p>[MESSAGE_4_PAYMENT_TEXT]</p>

    <p>মূল্য: [PRICE] টাকা</p>

    <label>পেমেন্ট মেথড</label>
    <select id="payment" onchange="showPaymentInfo()">
        <option value="">নির্বাচন করুন</option>
        <option value="বিকাশ">বিকাশ</option>
        <option value="নগদ">নগদ</option>
        <option value="রকেট">রকেট</option>
    </select>

    <div id="paymentInfo"></div>

    <button onclick="showStep(5)">পে করবো</button>
</div>

<!-- STEP 5 -->
<div id="step5" class="card hidden">

    <p>[MESSAGE_5_TRX_TEXT]</p>

    <label>Transaction ID</label>
    <input type="text" id="trx">

    <button onclick="submitForm()">পরবর্তী</button>
</div>

<!-- SUCCESS -->
<div id="success" class="card hidden">
    <h3>✅ আপনার তথ্য গ্রহণ করা হয়েছে</h3>

    <p>⏳ যাচাই করা হচ্ছে</p>

    <p>
        গ্রুপে যোগ দিন:<br>
        <a href="[GROUP_LINK]" target="_blank">GROUP LINK</a>
    </p>

    <p>
        যোগাযোগ:<br>
        [CONTACT_USERNAME]
    </p>
</div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbxoh4B7Mck0-3LfjLp3m7yQCiARBlyTVo8oTGm8lJ61ujdZJDJH0n4QyEJlU5lPKQW2CQ/exec";

function showStep(step){

    document.querySelectorAll(".card").forEach(x=>{
        x.classList.add("hidden");
    });

    document.getElementById("step"+step).classList.remove("hidden");
}

function showPaymentInfo(){

    const p = document.getElementById("payment").value;

    let text = "";

    if(p==="বিকাশ"){
        text =
        "বিকাশ নম্বর: [BKASH_NUMBER]<br>Amount: [PRICE]";
    }

    if(p==="নগদ"){
        text =
        "নগদ নম্বর: [NAGAD_NUMBER]<br>Amount: [PRICE]";
    }

    if(p==="রকেট"){
        text =
        "রকেট নম্বর: [ROCKET_NUMBER]<br>Amount: [PRICE]";
    }

    document.getElementById("paymentInfo").innerHTML=text;
}

function submitForm(){

    const data = {

        name:
        document.getElementById("name").value,

        phone:
        document.getElementById("phone").value,

        district:
        document.getElementById("district").value,

        nightwork:
        document.getElementById("nightwork").value,

        payment:
        document.getElementById("payment").value,

        trx:
        document.getElementById("trx").value
    };

    fetch(scriptURL,{
        method:"POST",
        body:JSON.stringify(data)
    })
    .then(r=>r.json())
    .then(res=>{

        document.querySelectorAll(".card").forEach(x=>{
            x.classList.add("hidden");
        });

        document
        .getElementById("success")
        .classList
        .remove("hidden");

    })
    .catch(err=>{
        alert("ত্রুটি হয়েছে");
    });

}

</script>

</body>
</html>
